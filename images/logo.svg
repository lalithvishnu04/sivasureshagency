<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 200" width="180" height="200">
  <!-- Outer border frame -->
  <rect x="8" y="35" width="164" height="160" fill="none" stroke="#1a3d6e" stroke-width="5" rx="3"/>
  <!-- Inner border -->
  <rect x="14" y="41" width="152" height="148" fill="none" stroke="#1a3d6e" stroke-width="1.5" rx="2"/>
  <!-- Flower/pinwheel design on top center -->
  <g transform="translate(90, 32)">
    <!-- Petals -->
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#c41e3a" transform="rotate(0)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#1a3d6e" transform="rotate(45)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#c41e3a" transform="rotate(90)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#1a3d6e" transform="rotate(135)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#c41e3a" transform="rotate(180)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#1a3d6e" transform="rotate(225)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#c41e3a" transform="rotate(270)"/>
    <ellipse cx="0" cy="-9" rx="5" ry="12" fill="#1a3d6e" transform="rotate(315)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="5" fill="#1a3d6e"/>
    <circle cx="0" cy="0" r="3" fill="#c41e3a"/>
  </g>
  <!-- SSA Letters - Bold italic serif style -->
  <text x="30" y="145" font-family="'Times New Roman', 'Georgia', serif" font-size="68" font-weight="bold" font-style="italic" fill="#c41e3a" letter-spacing="-2">S</text>
  <text x="72" y="145" font-family="'Times New Roman', 'Georgia', serif" font-size="68" font-weight="bold" font-style="italic" fill="#1a3d6e" letter-spacing="-2">S</text>
  <text x="114" y="145" font-family="'Times New Roman', 'Georgia', serif" font-size="68" font-weight="bold" font-style="italic" fill="#c41e3a" letter-spacing="-2">A</text>
  <!-- Decorative line under text -->
  <line x1="30" y1="155" x2="150" y2="155" stroke="#1a3d6e" stroke-width="1.5"/>
  <!-- Tagline -->
  <text x="90" y="172" font-family="Arial, sans-serif" font-size="9" fill="#1a3d6e" text-anchor="middle" letter-spacing="3" font-weight="600">AGENCY</text>
</svg>
